<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://fonts.googleapis.com/css?family=Source+Code+Pro:regular,700" rel="stylesheet" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"
		integrity="sha512-xh6O/CkQoPOWDdYTDqeRdPCVd1SpvCA9XXcUnZS2FmJNp1coAFzvtCN9BmamE+4aHK8yyUHUSCcJHgXloTyT2A=="
		crossorigin="anonymous" referrerpolicy="no-referrer" />
	<link rel="stylesheet" href="css/style.css">

	<title>Egorov.dev</title>
</head>

<body>

	<div class="holder">
		<select class="change-lang">
			<option value="ru">RU</option>
			<option value="en" selected>EN</option>
		</select>
		<video src="./video/smoke.mp4" autoplay loop muted></video>
		<section>
			<h2 class="lng-occupation">Front-end developer</h2>
			<h1 class="lng-name">Egorov Alex</h1>
		</section>
		<button class="arrow-down">
			<span class="arrow-down__text lng-press">press the space to scroll</span>
			<i class="fa fa-angle-double-down arrow-btn" aria-hidden="true"></i>
		</button>
	</div>
	<div class="content">
		<div class="container">
			<div class="content__experience experience">
				<div class="experience__title">
					<h1 class="lng-experience-title">My Experience</h1>
					<h2 class="lng-experience-subtitle">My Abilities</h2>
				</div>
				<div class="experience__block">
					<div class="experience__block--item experience-lang">
						<div class="experience-lang__title lng-experience-lang__title">Programming languages </div>
						<div class="experience-lang__subtitle lng-experience-lang__subtitle">More than 6 months</div>
						<div class="experience-lang__progreesBar">
							<div class="progress"><span class="progress-html">HTML</span>60%</div>
							<div class="progress"><span class="progress-css">CSS</span>50%</div>
							<div class="progress"><span class="progress-javascript">JavaScript</span>20%</div>
						</div>
					</div>

					<div class="experience__block--item experience-tools">
						<div class="experience-tools__title lng-experience-tools__title">Tools</div>
						<div class="experience-tools__subtitle lng-experience-tools__subtitle"">More than 6 months</div>
						<div class="experience-tools__progreesBar">
							<div class="progress"><span class="progress-figma">Figma</span>60%</div>
							<div class="progress"><span class="progress-git">Git</span>50%</div>
							<div class="progress"><span class="progress-javascript">Visual Studio Code</span>20%</div>
						</div>
					</div>
				</div>
			</div>
		</div>

	</div>

	<script src="js/lang.js" defer></script>
	<script src="js/app.js" defer></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.1/jquery.min.js"
		integrity="sha512-aVKKRRi/Q/YV+4mjoKBsE4x3H+BkegoM/em46NNlCqNTmUYADjBbeNefNxYV7giUp0VxICtqdrbqU7iVaeZNXA=="
		crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</body>

</html>
